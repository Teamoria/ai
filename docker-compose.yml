# ──────────────────────────────────────────────────
# Teamoria AI Service — Docker Compose
# ──────────────────────────────────────────────────
# Usage:
#   Development : docker compose --env-file ai-service/.env up --build
#   Production  : docker compose --env-file ai-service/.env --project-name teamoria-ai up -d --build
# ──────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamoria_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI AI Service ───────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # AI_SERVICE_PORT is loaded from ai-service/.env by --env-file.
      # The service remains private to the server host.
      - "127.0.0.1:${AI_SERVICE_PORT:-8000}:8000"
    env_file:
      - path: ai-service/.env
        required: false  # Copy .env.example → .env before deploying
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/teamoria_ai
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/tmp/uploads

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
