# ──────────────────────────────────────────────────
# Teamoria AI Service — Docker Compose
# ──────────────────────────────────────────────────
# Usage:
#   Development : docker compose up --build
#   Production  : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamoria_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI AI Service ───────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - path: ai-service/.env
        required: false  # Copy .env.example → .env before deploying
    environment:
      PORT: ${PORT:-8000}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/teamoria_ai
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/tmp/uploads

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
